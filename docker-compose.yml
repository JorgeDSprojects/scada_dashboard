services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scada}
      POSTGRES_USER: ${POSTGRES_USER:-scada}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scada}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  simulator:
    build: ./services/simulator
    networks:
      - backend

  backend:
    build: ./services/backend
    depends_on:
      - postgres
      - simulator
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-${POSTGRES_DB:-scada}}
      DB_USER: ${DB_USER:-${POSTGRES_USER:-scada}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-scada}}
    networks:
      - backend

  frontend:
    build: ./services/frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
